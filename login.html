<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>People in Places - Login</title>
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/homgestyle.css">
  <link rel="stylesheet" href="css/login.css">
</head>
<body>
  <header class="header">
    <div class="inner">
      <button class="menu-btn" type="button" aria-label="Open menu">☰</button>
      <nav class="nav nav-left">
        <a href="about.html">About</a>
        <a href="homepage.html">Home</a>
        <a href="shop.html">Shop</a>
        <a href="info.html">Info</a>
      </nav>
      <h1 class="logo">PEOPLE IN PLACES</h1>
      <nav class="nav nav-right">
        <a href="login.html">Login</a>
        <a href="mypage.html">My page</a>
        <a href="admin.html" id="adminMenuLink" style="display: none;">Admin</a>
      </nav>
    </div>
    <div class="mobile-menu">
      <a href="about.html">About</a>
      <a href="homepage.html">Home</a>
      <a href="shop.html">Shop</a>
      <a href="info.html">Info</a>
      <a href="login.html">Login</a>
      <a href="mypage.html">My page</a>
      <a href="admin.html" id="mobileAdminMenuLink" style="display: none;">Admin</a>
    </div>
  </header>

  <div class="modal-backdrop" id="modalBackdrop"></div>

  <!-- ① 로그인 -->
  <div class="modal" id="loginModal" role="dialog" aria-modal="true">
    <button class="modal-close" id="loginClose" type="button" aria-label="닫기">✕</button>
    <h2 class="modal-title">로그인</h2>
    <button class="kakao-btn" type="button" id="kakaoBtn">카카오톡으로 시작하기</button>
    <div id="adminLoginSection" style="display:none;">
      <div class="modal-divider"><span>관리자</span></div>
      <form class="modal-form" id="loginForm">
        <div class="modal-input-wrap">
          <input type="email" id="loginEmail" class="modal-input" placeholder="이메일" autocomplete="email" required>
        </div>
        <div class="modal-input-wrap">
          <input type="password" id="loginPassword" class="modal-input" placeholder="비밀번호" autocomplete="current-password" required>
        </div>
        <p class="modal-error" id="loginError"></p>
        <button type="submit" class="modal-submit-btn" id="loginSubmitBtn">관리자 로그인</button>
      </form>
    </div>
    <div class="modal-bottom-links" style="justify-content:center; display:none;" id="findBtnWrap">
      <button type="button" class="modal-text-btn" id="goFindBtn">비밀번호 찾기</button>
    </div>
  </div>

  <!-- ③ 아이디/비밀번호 찾기 -->
  <div class="modal" id="findModal" role="dialog" aria-modal="true">
    <button class="modal-close" id="findClose" type="button" aria-label="닫기">✕</button>
    <h2 class="modal-title">비밀번호 찾기</h2>

    <!-- 비밀번호 찾기 (2단계: 휴대폰인증 → 새비밀번호) -->
    <div class="modal-tab-panel" id="findPwPanel">

      <!-- step1: 휴대폰 번호 인증 -->
      <div id="findPwStep1">
        <p class="modal-guide">가입 시 등록한 휴대폰 번호로 본인인증을 진행합니다.</p>
        <form class="modal-form" id="findPwPhoneForm">
          <div style="display:flex; gap:0; margin-bottom:-1px;">
            <div class="modal-input-wrap" style="flex:1; margin-bottom:0;">
              <input type="tel" id="findPwPhone" class="modal-input" placeholder="휴대폰 번호 (예: 01012345678)" required>
            </div>
            <button type="button" class="modal-addr-btn" id="sendFindPwPhoneOtpBtn" style="flex-shrink:0;">인증번호 발송</button>
          </div>
          <div class="modal-input-wrap otp-input-wrap" id="findPwPhoneOtpWrap" style="display:none; margin-top:0;">
            <input type="text" id="findPwPhoneOtp" class="modal-input" placeholder="인증번호 6자리" maxlength="6" inputmode="numeric">
            <span class="otp-timer" id="findPwPhoneOtpTimer">03:00</span>
          </div>
          <p class="modal-error" id="findPwPhoneErr"></p>
          <!-- 인증 확인 버튼: 인증번호 발송 후에만 활성화 -->
          <button type="submit" class="modal-submit-btn" id="verifyFindPwPhoneBtn" disabled>인증 확인</button>
        </form>
      </div>

    </div>

    <div class="modal-bottom-links" style="margin-top:16px;">
      <button type="button" class="modal-text-btn" id="backToLoginFromFindBtn">← 로그인으로</button>
    </div>
  </div>

  <!-- ④ 새 비밀번호 설정 모달 (휴대폰 인증 완료 후 열림) -->
  <div class="modal" id="findPwNewModal" role="dialog" aria-modal="true">
    <button class="modal-close" id="findPwNewClose" type="button" aria-label="닫기">✕</button>
    <h2 class="modal-title">비밀번호 찾기</h2>

    <!-- 이메일 발송 완료 화면 -->
    <div class="modal-complete">
      <div class="modal-complete-icon">✓</div>
      <p class="modal-complete-msg">비밀번호 재설정 링크를 발송했습니다.<br>가입 시 등록한 이메일을 확인해주세요.<br><br><small style="color:#aaa;">링크는 1시간 동안 유효합니다.</small></p>
      <button type="button" class="modal-submit-btn" id="goLoginAfterPwBtn">로그인하러 가기</button>
    </div>
  </div>


  <!-- ⑤ 카카오 첫 로그인 배송지 입력 모달 -->
  <div class="modal" id="kakaoShippingModal" role="dialog" aria-modal="true">
    <h2 class="modal-title">배송지 입력</h2>
    <p class="modal-guide">주문 시 사용할 배송지를 입력해주세요.<br>나중에 마이페이지에서 변경할 수 있습니다.</p>
    <form class="modal-form" id="kakaoShippingForm">
      <div class="modal-input-wrap">
        <input type="text" id="kakaoName" class="modal-input" placeholder="이름" required>
      </div>
      <div class="modal-input-wrap">
        <input type="tel" id="kakaoPhone" class="modal-input" placeholder="휴대폰 번호 (예: 01012345678)" required>
      </div>
      <div class="modal-address-row">
        <input type="text" id="kakaoPostcode" class="modal-input modal-input--postcode" placeholder="우편번호" readonly>
        <button type="button" class="modal-addr-btn" id="kakaoPostcodeBtn">주소 찾기</button>
      </div>
      <div class="modal-input-wrap">
        <input type="text" id="kakaoAddr1" class="modal-input" placeholder="기본 주소" readonly>
      </div>
      <div class="modal-input-wrap">
        <input type="text" id="kakaoAddr2" class="modal-input" placeholder="상세 주소 (동, 호수 등)">
      </div>
      <p class="modal-error" id="kakaoShippingError"></p>
      <button type="submit" class="modal-submit-btn">저장하기</button>
    </form>
    <div class="modal-bottom-links" style="justify-content:center;">
      <button type="button" class="modal-text-btn" id="kakaoShippingSkipBtn">나중에 입력</button>
    </div>
  </div>

  <!-- 주소 검색 팝업 -->
  <div class="addr-backdrop is-hidden" id="addrBackdrop">
    <div class="addr-popup" id="addrPopup">
      <div class="addr-popup-head">
        <span>주소 검색</span>
        <button type="button" class="addr-popup-close" id="addrPopupClose">✕</button>
      </div>
      <div id="daumPostcodeLayer"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/userService.js"></script>
  <script src="js/common.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
