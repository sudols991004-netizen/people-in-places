<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>People in Places - 결제 실패</title>
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/homgestyle.css">
  <style>
    .result-page {
      min-height: calc(100vh - 72px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 16px;
      background: #f7f7f7;
    }
    .result-box {
      background: #fff;
      border: 1px solid #ddd;
      padding: 48px 40px;
      text-align: center;
      max-width: 480px;
      width: 100%;
    }
    .result-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 60px;
      height: 60px;
      border: 2px solid #d00;
      border-radius: 50%;
      font-size: 26px;
      color: #d00;
      margin-bottom: 24px;
    }
    .result-title {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 14px;
    }
    .result-msg {
      font-size: 13px;
      color: #555;
      line-height: 1.8;
      margin-bottom: 20px;
    }
    .result-error {
      background: #fff5f5;
      border: 1px solid #fdd;
      padding: 14px 16px;
      margin-bottom: 20px;
      font-size: 12px;
      color: #c00;
      line-height: 1.8;
    }
    .result-btn {
      display: inline-block;
      width: 100%;
      height: 48px;
      background: #111;
      color: #fff;
      border: none;
      font-size: 14px;
      cursor: pointer;
      margin-top: 8px;
    }
    .result-btn-white {
      background: #fff;
      color: #111;
      border: 1px solid #ddd;
    }
    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="inner">
      <button class="menu-btn" type="button" aria-label="Open menu">☰</button>
      <nav class="nav nav-left">
        <a href="about.html">About</a>
        <a href="homepage.html">Home</a>
        <a href="shop.html">Shop</a>
        <a href="info.html">Info</a>
      </nav>
      <h1 class="logo">PEOPLE IN PLACES</h1>
      <nav class="nav nav-right">
        <a href="login.html">Login</a>
        <a href="mypage.html">My page</a>
        <a href="admin.html" id="adminMenuLink" style="display: none;">Admin</a>
      </nav>
    </div>
  </header>

  <main class="result-page">
    <div class="result-box">
      <div class="result-icon">✕</div>
      <h2 class="result-title">결제에 실패했습니다</h2>
      <p class="result-msg">결제 처리 중 문제가 발생했습니다.<br>다시 시도해주세요.</p>
      <div class="result-error" id="errorInfo"></div>
      <div class="btn-group">
        <button type="button" class="result-btn" id="retryBtn">다시 시도하기</button>
        <button type="button" class="result-btn result-btn-white" id="goShopBtn">Shop으로 돌아가기</button>
      </div>
    </div>
  </main>

  <script src="js/common.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const params   = new URLSearchParams(window.location.search);
      const code     = params.get('code') || '';
      const message  = params.get('message') || '알 수 없는 오류가 발생했습니다.';
      const errorEl  = document.getElementById('errorInfo');

      errorEl.innerHTML = `
        <p>오류 코드: <strong>${code}</strong></p>
        <p>오류 메시지: <strong>${message}</strong></p>
      `;

      document.getElementById('retryBtn').addEventListener('click', function () {
        // order 페이지로 돌아가기 (선택된 상품은 localStorage에 남아있음)
        window.location.href = 'order.html';
      });

      document.getElementById('goShopBtn').addEventListener('click', function () {
        window.location.href = 'shop.html';
      });
    });
  </script>
</body>
</html>
